name: Daily Technical Signals

on:
  schedule:
    - cron: '30 7 * * 1-5'  # 월~금 07:30 UTC = 16:30 KST (한국 장 마감 후)
  workflow_dispatch:          # 수동 테스트용

permissions:
  contents: write

jobs:
  signals:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily technical signals
        run: python run_daily_signals.py

      - name: Commit web data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/signals/
          git diff --staged --quiet || (
            git commit -m "chore: update technical signals web data [skip ci]" &&
            git push
          )
