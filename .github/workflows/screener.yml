name: 20-20 Club Screener

on:
  schedule:
    - cron: '0 0 15 4 *'   # 4월 15일 09:00 KST (= 00:00 UTC)
    - cron: '0 0 15 7 *'   # 7월 15일 09:00 KST
    - cron: '0 0 15 10 *'  # 10월 15일 09:00 KST
    - cron: '0 0 15 1 *'   # 1월 15일 09:00 KST
  workflow_dispatch:         # 수동 실행 (GitHub UI에서 테스트 가능)

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py
