name: 20-20 Club Screener

on:
  schedule:
    - cron: '0 0 16 4 *'   # 4월 16일 09:00 KST (= 00:00 UTC)
    - cron: '0 0 16 6 *'   # 6월 16일 09:00 KST
    - cron: '0 0 16 9 *'   # 9월 16일 09:00 KST
    - cron: '0 0 16 12 *'  # 12월 16일 09:00 KST
  workflow_dispatch:         # 수동 실행 (GitHub UI에서 테스트 가능)

permissions:
  contents: write            # 20-20 Club 캐시 파일 커밋을 위해 필요

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Commit 20-20 Club cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/2020_club.json
          git diff --staged --quiet || (
            git commit -m "chore: update 20-20 Club cache [skip ci]" &&
            git push
          )
